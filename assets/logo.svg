<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F6E05E"/>
      <stop offset="100%" stop-color="#ED8936"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="0" y="0" width="420" height="120" rx="16" fill="url(#bgGradient)" stroke="#1e293b" stroke-width="1.5"/>

  <g transform="translate(15, 0)">

    <line x1="25" y1="90" x2="105" y2="90" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>

    <path d="M 25 30 C 45 30, 45 90, 70 90"
          fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>

    <path d="M 25 30 C 75 30, 75 90, 100 90"
          fill="none" stroke="url(#holoGradient)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

    <line x1="49" y1="60" x2="68" y2="60" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 2"/>
    <path d="M 64 57 L 69 60 L 64 63" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <polygon points="76,19 80,16.5 84,19 84,24 80,26.5 76,24" fill="#F6E05E" filter="url(#glow)"/>

    <g stroke="#334155" stroke-width="2" stroke-linecap="round">
        <line x1="30" y1="104" x2="30" y2="101"/>
        <line x1="35" y1="104" x2="35" y2="99"/>
        <line x1="40" y1="104" x2="40" y2="102"/>
        <line x1="45" y1="104" x2="45" y2="98"/>
        <line x1="50" y1="104" x2="50" y2="101"/>
        <line x1="55" y1="104" x2="55" y2="103"/>
        <line x1="60" y1="104" x2="60" y2="98"/>
        <line x1="65" y1="104" x2="65" y2="101"/>
        <line x1="70" y1="104" x2="70" y2="99"/>
        <line x1="75" y1="104" x2="75" y2="100"/>
        <line x1="80" y1="104" x2="80" y2="102"/>
        <line x1="85" y1="104" x2="85" y2="98"/>
        <line x1="90" y1="104" x2="90" y2="101"/>
        <line x1="95" y1="104" x2="95" y2="99"/>
        <line x1="100" y1="104" x2="100" y2="102"/>
