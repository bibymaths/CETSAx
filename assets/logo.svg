  <text x="146" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1.2" text-transform="uppercase">
    Thermal Shift <tspan fill="#334155">·</tspan> Sequence Model <tspan fill="#334155">·</tspan> Binding
