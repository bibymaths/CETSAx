  <text x="145" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#f8fafc" letter-spacing="-0.5">
    CETSA<tspan fill="#64748b" font-weight="400">x</tspan>
  </text>

  <text x="146" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F6E05E" letter-spacing="1">
