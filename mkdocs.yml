repo_name: bibymaths/CETSAx
repo_url: https://github.com/bibymaths/CETSAx

site_name: CETSAx
site_description: CETSA-MS modelling toolkit for dose–response analysis, binder classification, Bayesian inference, ML curve typing, and proteome-wide stability networks.
site_author: Abhinav Mishra

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

  icon:
    repo: fontawesome/brands/github

  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: false
            members_order: source

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bibymaths

copyright: "© 2026 Abhinav Mishra"

nav:
  - Home: index.md
  - Design Principles: design_principles.md
  - Scientific Model:
      - Curve Fitting: curve_fitting.md
      - Sensitivity Scoring: sensitivity_scoring.md
      - Equations: equations.md
  - Systems Analysis:
      - Pathway Enrichment: pathway_enrichment.md
      - Network Analysis: network_analysis.md
      - Latent Analysis: latent_analysis.md
  - Sequence Modeling:
      - Overview: sequence_modeling.md
      - Explainability: explainability.md
  - Visualization: visualization.md
  - Usage: usage.md
  - API Reference: api.md
  - Limitations: limitations.md
  - Contributing: contributing.md
  - Citation: citation.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js