repo_name: bibymaths/CETSAx
repo_url: https://github.com/bibymaths/CETSAx

site_name: CETSAx
site_description: CETSA-MS modelling toolkit for dose–response analysis, binder classification, Bayesian inference, ML curve typing, and proteome-wide stability networks.
site_author: Abhinav Mishra

theme:
  name: material
  language: en
  font:
    text: Ubuntu           # The font for standard paragraph text
    code: Fira Code        # The font for code blocks
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo # Change this to your brand color!
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_source: false
            members_order: source

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bibymaths

nav:
  - Home: index.md
  - Pipeline Overview: workflow.md
  - Design Principles: design_principles.md
  - Data: data.md
  - Scientific Model:
      - Curve Fitting: curve_fitting.md
      - Sensitivity Scoring: sensitivity_scoring.md
      - Equations: equations.md
  - Systems Analysis:
      - Pathway Enrichment: pathway_enrichment.md
      - Network Analysis: network_analysis.md
      - Latent Analysis: latent_analysis.md
  - Sequence Modeling:
      - Overview: sequence_modeling.md
      - Explainability: explainability.md
  - Visualization: visualization.md
  - Usage: usage.md
  - API Reference: api.md
  - Limitations: limitations.md
  - Contributing: contributing.md
  - Citation: citation.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - def_list

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

copyright: >
  Copyright &copy; 2026 <a href="https://bibymaths.github.io">Abhinav Mishra</a>.