name: Code Quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Install uv (super fast!)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff (Linter & Formatter)
        run: |
          uv run ruff check cetsax/ scripts/
          uv run ruff format --check cetsax/ scripts/

      - name: Run MyPy (Type Checker)
        run: uv run mypy cetsax/ --ignore-missing-imports